# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    images_directory: '%kernel.project_dir%/public/uploads/images'
    mailer_from_address: '%env(string:MAILER_FROM_ADDRESS)%'
    mailer_from_name: '%env(string:MAILER_FROM_NAME)%'
    env(FACEPP_API_KEY): ''
    env(FACEPP_API_SECRET): ''
    env(FACEPP_API_BASE_URL): 'https://api-us.faceplusplus.com'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

   
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
    App\Service\GoogleDriveService:
        arguments:
            $credentialsPath: '%kernel.project_dir%/google-drive-credentials.json'

    App\Service\ConversationSummaryService:
        arguments:
            $geminiApiKey: '%env(GEMINI_API_KEY)%'
            $geminiApiUrl: '%gemini_api_url%'

    App\Service\ChatbotService:
        arguments:
            $mistralApiKey: '%env(MISTRAL_API_KEY)%'
            $mistralApiUrl: '%mistral_api_url%'
            $mistralModel: '%mistral_model%'

    App\Service\OpenAiMatchingService:
        arguments:
            $apiKey: '%env(string:OPENAI_API_KEY)%'
            $model: '%env(string:OPENAI_MODEL)%'
            $apiBaseUrl: '%env(string:OPENAI_API_BASE_URL)%'
            $requestTimeoutSeconds: '%env(int:OPENAI_TIMEOUT_SECONDS)%'
            $plannerApiKey: '%env(string:PLANNER_AI_API_KEY)%'
            $plannerModel: '%env(string:PLANNER_AI_MODEL)%'
            $plannerApiBaseUrl: '%env(string:PLANNER_AI_API_BASE_URL)%'
            $plannerTimeoutSeconds: '%env(int:PLANNER_AI_TIMEOUT_SECONDS)%'

    App\Service\StripeCheckoutService:
        arguments:
            $stripeSecretKey: '%env(string:STRIPE_SECRET_KEY)%'
            $stripeWebhookSecret: '%env(string:STRIPE_WEBHOOK_SECRET)%'
            $stripePublishableKey: '%env(string:STRIPE_PUBLISHABLE_KEY)%'
            $defaultCurrency: '%env(string:STRIPE_CURRENCY)%'
            $defaultPricePerHourCents: '%env(int:STRIPE_PRICE_PER_HOUR_CENTS)%'

    App\Service\PaymentService:
        arguments:
            $paymentProvider: '%env(string:PAYMENT_PROVIDER)%'

    App\Service\EmailService:
        arguments:
            $mailerDsn: '%env(MAILER_DSN)%'
            $fromAddress: '%env(MAILER_FROM_ADDRESS)%'
            $fromName: '%env(MAILER_FROM_NAME)%'

    App\Service\FacePlusPlusService:
        arguments:
            $apiKey: '%env(string:FACEPP_API_KEY)%'
            $apiSecret: '%env(string:FACEPP_API_SECRET)%'
            $apiBaseUrl: '%env(string:FACEPP_API_BASE_URL)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\AiContentGenerator:
        arguments:
            $openAiApiKey: '%env(default::OPENAI_API_KEY)%'
